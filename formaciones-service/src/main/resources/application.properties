# El nombre con el que aparecerás en el panel negro
spring.application.name=formaciones-service

# Le asignamos un puerto específico para que no choque con otros microservicios (ej. jugadores-service)
server.port=8083

# ===============================
# CONEXIÓN A BASE DE DATOS (MYSQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/db_formaciones?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# 'update' creará o actualizará las tablas automáticamente en base a nuestro código Java
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola (muy útil para debuggear)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# La dirección de tu Servidor Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/