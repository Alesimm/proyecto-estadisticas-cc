# Nombre del servicio
spring.application.name=formaciones-service

# Puerto del microservicio (8083 está perfecto, no choca con el 8081 de jugadores)
server.port=8083

# ===============================
# CONEXIÓN A BASE DE DATOS (MYSQL)
# ===============================
# IMPORTANTE: Cambiamos 3306 por 3310 para que coincida con tu XAMPP
# Agregamos createDatabaseIfNotExist=true para que no tengas que crearla a mano
spring.datasource.url=jdbc:mysql://localhost:3310/db_formaciones?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dejamos que Spring Boot 3 elija el dialecto automáticamente (es más seguro)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Dirección del Servidor Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/